<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Random kérdésgenerátor</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#1f1c2c,#3a2e5f);
color:#fff;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:24px;
}

.container{
width:100%;
max-width:1000px;
background:rgba(255,255,255,0.08);
border-radius:20px;
padding:24px;
backdrop-filter:blur(10px);
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h1{
text-align:center;
margin-top:0;
margin-bottom:24px;
font-size:2rem;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,0.08);
border-radius:16px;
padding:20px;
min-height:260px;
display:flex;
flex-direction:column;
justify-content:space-between;
border:1px solid rgba(255,255,255,0.12);
}

.card h2{
margin-top:0;
margin-bottom:12px;
font-size:1.3rem;
}

.question{
flex:1;
font-size:1.05rem;
line-height:1.5;
background:rgba(0,0,0,0.18);
border-radius:12px;
padding:16px;
margin-bottom:16px;
display:flex;
align-items:center;
transition:transform 0.15s ease;
}

.meta{
font-size:0.9rem;
opacity:0.8;
margin-bottom:12px;
}

button{
border:none;
border-radius:12px;
padding:12px 16px;
font-size:1rem;
cursor:pointer;
color:white;
font-weight:bold;
transition:transform 0.15s ease;
}

button:hover{
transform:translateY(-2px);
}

.friend-btn{
background:#4f8cff;
}

.romantic-btn{
background:#ff5fa2;
}

.intimate-btn{
background:#b16cff;
}

.reset-wrap{
margin-top:24px;
text-align:center;
}

.reset-btn{
background:#ff9f43;
padding:14px 22px;
}

.toggle{
text-align:center;
margin-top:10px;
margin-bottom:10px;
font-size:1.1rem;
}

</style>
</head>

</div>
<div class="meta" id="friend-meta"></div>
</div>

</div>

</div>

</div>

</div>

</div>

</div>


<div class="toggle">
<label>
<input type="checkbox" id="spicyToggle">
🔥 Spicy Mode
</label>
</div>


<div class="reset-wrap">
<button class="reset-btn" onclick="resetQuestions()">

</div>

let availableQuestions={};

function cloneQuestions(){
return{
friend:[...originalQuestions.friend],
romantic:[...originalQuestions.romantic],
intimate:[...originalQuestions.intimate]
}
}

function updateMeta(category){

const meta=document.getElementById(category+"-meta")

meta.textContent="Hátralévő kérdések: "+availableQuestions[category].length

}

function spinAnimation(box,category){

let spins=0

let interval=setInterval(()=>{

let pool=originalQuestions[category]

let random=pool[Math.floor(Math.random()*pool.length)]

box.textContent=random

spins++

if(spins>15){

clearInterval(interval)

finalQuestion(category)

}

},70)

}

function finalQuestion(category){

let spicy=document.getElementById("spicyToggle").checked

if(spicy && category!=="intimate"){

if(Math.random()<0.35){

category="intimate"

}

}

let box=document.getElementById(category+"-question")

let list=availableQuestions[category]

if(list.length===0){

box.textContent="Ebben a kategóriában már elfogytak a kérdések."

updateMeta(category)

return

}

let index=Math.floor(Math.random()*list.length)

let q=list.splice(index,1)[0]

box.textContent=q

box.style.transform="scale(1.05)"

setTimeout(()=>box.style.transform="scale(1)",120)

updateMeta(category)

}

function showRandomQuestion(category){

let box=document.getElementById(category+"-question")

spinAnimation(box,category)

}

function resetQuestions(){

availableQuestions=cloneQuestions()

document.getElementById("friend-question").textContent="Nyomd meg a gombot egy kérdésért."

document.getElementById("romantic-question").textContent="Nyomd meg a gombot egy kérdésért."

document.getElementById("intimate-question").textContent="Nyomd meg a gombot egy kérdésért."

updateMeta("friend")
updateMeta("romantic")
updateMeta("intimate")

}

resetQuestions()
