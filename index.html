<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bazár</title>

<style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    scroll-behavior:smooth;
}

body{
    font-family:Georgia, serif;
    display:flex;
    background:
    linear-gradient(rgba(245,220,170,.85), rgba(225,195,140,.85)),
    url("images/desert-bg.jpg");
    background-size:cover;
    background-attachment:fixed;
    color:#3f2b18;
}

/* ===== Tartalomjegyzék ===== */

nav{
    width:280px;
    position:fixed;
    height:100vh;
    overflow:auto;

    background:rgba(79,55,33,.92);
    border-right:5px solid #c79b4f;

    padding:25px;

    box-shadow:5px 0 20px rgba(0,0,0,.35);
}

nav h2{
    text-align:center;
    color:#f6d58f;
    margin-bottom:25px;
    font-size:28px;
    letter-spacing:2px;
}

nav ul{
    list-style:none;
}

nav li{
    margin:18px 0;
}

nav a{
    display:block;
    padding:12px;

    text-decoration:none;

    color:#efd9a6;

    border-left:4px solid transparent;

    transition:.3s;
}

nav a:hover{

    background:#7a5730;
    border-left:4px solid gold;
    padding-left:20px;
}

/* ===== Tartalom ===== */

main{

    margin-left:300px;

    width:100%;
    padding:50px;
}

h1{

    text-align:center;

    font-size:48px;

    color:#6b4318;

    margin-bottom:50px;

    text-shadow:2px 2px 5px rgba(255,255,255,.4);
}

section{

    margin-bottom:80px;

    background:rgba(255,245,220,.82);

    padding:30px;

    border-radius:18px;

    border:3px solid #b98a47;

    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

h2{

    margin-bottom:25px;

    color:#8b5a2b;

    border-bottom:3px solid #c9a76b;

    padding-bottom:10px;
}

/* ===== Galéria ===== */

.gallery{

    display:grid;

    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));

    gap:22px;
}

.gallery img{

    width:100%;

    height:200px;

    object-fit:cover;

    border-radius:12px;

    border:5px solid #b58b4f;

    cursor:pointer;

    transition:.35s;

    box-shadow:0 5px 15px rgba(0,0,0,.35);
}

.gallery img:hover{

    transform:scale(1.05) rotate(1deg);

    border-color:gold;

    box-shadow:0 10px 25px rgba(0,0,0,.45);
}

/* ===== Mobil ===== */

@media(max-width:900px){

body{
    display:block;
}

nav{
    position:relative;
    width:100%;
    height:auto;
}

main{
    margin-left:0;
    padding:20px;
}

}
</style>

</head>
<body>
<main>
<h1>Bazár</h1>

<section id="varos">



<div class="gallery">
<h2>1. Étel</h2>
<a href="images/2.png" target="_blank">
<img src="images/2.png" alt="">
</a>

<h2>2. Ital</h2>
<a href="images/1.png" target="_blank">
<img src="images/1.png" alt="">
</a>


</div>

</section>

</main>
</body>
</html>
